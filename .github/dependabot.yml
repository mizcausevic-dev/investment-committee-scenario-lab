# Dependabot: monthly, grouped supply-chain freshness.
# Tamed 2026-06-20: monthly interval + grouped PRs to cut CI run-churn (was weekly, ungrouped).
# Security advisories at any severity still open their own PRs immediately (default).
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      actions:
        patterns: ["*"]
    open-pull-requests-limit: 3
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "ci"
      include: "scope"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      npm:
        patterns: ["*"]
    open-pull-requests-limit: 3
    labels: ["dependencies", "npm"]
    commit-message:
      prefix: "deps"
      include: "scope"
